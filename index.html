<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#5f6bdc,#8b5bbf);
margin:0;
padding:40px;
}

.header{
color:white;
margin-bottom:20px;
}

.header h1{
margin:0;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:10px 20px;
background:#eee;
cursor:pointer;
border-radius:8px;
}

.tab.active{
background:#4b5bdc;
color:white;
}

.tabcontent{
display:none;
}

.form-group{
margin-bottom:10px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#4b5bdc;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#f3f4f7;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.totalbox{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
<h1>SMARTGrade Planner System</h1>
<p>Student Target vs Actual Assessment Analyzer</p>
</div>

<div class="container">

<div class="card">

<div class="tabs">

<div class="tab active" onclick="openTab('planner',this)">Student Planner</div>
<div class="tab" onclick="openTab('compare',this)">Result Comparison</div>

</div>

<div id="planner" class="tabcontent" style="display:block">

<div class="form-group">
Student ID  
<input id="studentID">
<button onclick="loadStudent()">Load Student</button>
</div>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Class:</b> <span id="class"></span></p>

<table>

<tr>
<th>Assessment</th>
<th>Max</th>
<th>Weight</th>
<th>Target Mark</th>
<th>Contribution</th>
</tr>

<tr>
<td>A1</td>
<td id="maxA1"></td>
<td id="perA1"></td>
<td><input id="targetA1" oninput="calcTarget()"></td>
<td id="resA1"></td>
</tr>

<tr>
<td>A2</td>
<td id="maxA2"></td>
<td id="perA2"></td>
<td><input id="targetA2" oninput="calcTarget()"></td>
<td id="resA2"></td>
</tr>

<tr>
<td>A3</td>
<td id="maxA3"></td>
<td id="perA3"></td>
<td><input id="targetA3" oninput="calcTarget()"></td>
<td id="resA3"></td>
</tr>

<tr>
<td>A4</td>
<td id="maxA4"></td>
<td id="perA4"></td>
<td><input id="targetA4" oninput="calcTarget()"></td>
<td id="resA4"></td>
</tr>

</table>

<div class="totalbox">
Total Target Mark: <span id="totalTarget">0</span>
</div>

</div>

<div id="compare" class="tabcontent">

<table>

<tr>
<th>Assessment</th>
<th>Actual Mark</th>
<th>Contribution</th>
</tr>

<tr>
<td>A1</td>
<td id="actualA1"></td>
<td id="actualResA1"></td>
</tr>

<tr>
<td>A2</td>
<td id="actualA2"></td>
<td id="actualResA2"></td>
</tr>

<tr>
<td>A3</td>
<td id="actualA3"></td>
<td id="actualResA3"></td>
</tr>

<tr>
<td>A4</td>
<td id="actualA4"></td>
<td id="actualResA4"></td>
</tr>

</table>

<div class="totalbox">
Total Actual Mark: <span id="totalActual">0</span>
</div>

</div>

</div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbxfO99A_tHZJyARWczXoa4FVgf28t5I5LOApuhTNgwTqgfutp0gzVqjs1KnnjPRnJu4kA/exec";

function openTab(tab,el){

document.querySelectorAll(".tabcontent").forEach(x=>x.style.display="none")
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

document.getElementById(tab).style.display="block"
el.classList.add("active")

}

function calcTarget(){

let total=0

for(let i=1;i<=4;i++){

let target=document.getElementById("targetA"+i).value
let max=document.getElementById("maxA"+i).innerText
let weight=document.getElementById("perA"+i).innerText

let res=(target/max)*weight

if(!isNaN(res)){

document.getElementById("resA"+i).innerText=res.toFixed(2)

total+=res

}

}

document.getElementById("totalTarget").innerText=total.toFixed(2)

}

function loadStudent(){

var id=document.getElementById("studentID").value

fetch(url+"?id="+id)

.then(res=>res.json())

.then(data=>{

document.getElementById("name").innerText=data[0]
document.getElementById("class").innerText=data[2]

document.getElementById("maxA1").innerText=data[5]
document.getElementById("perA1").innerText=data[6]

document.getElementById("maxA2").innerText=data[10]
document.getElementById("perA2").innerText=data[11]

document.getElementById("maxA3").innerText=data[15]
document.getElementById("perA3").innerText=data[16]

document.getElementById("maxA4").innerText=data[20]
document.getElementById("perA4").innerText=data[21]

})

}

</script>

</body>
</html>
