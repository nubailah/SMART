<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:linear-gradient(135deg,#5f6bdc,#8b5bbf);margin:0;padding:40px;}
.header{color:white;margin-bottom:20px;}
.header h1{margin:0;}
.container{max-width:1100px;margin:auto;}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.15);}
.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab{padding:10px 20px;background:#eee;cursor:pointer;border-radius:8px;}
.tab.active{background:#4b5bdc;color:white;}
.tabcontent{display:none;}
.form-group{margin-bottom:10px;}
input{padding:10px;border-radius:6px;border:1px solid #ccc;}
button{background:#4b5bdc;color:white;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#f3f4f7;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
.totalbox{margin-top:15px;font-size:18px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">
<h1>SMARTGrade Planner System</h1>
<p>Student Target vs Actual Assessment Analyzer</p>
</div>

<div class="container">
<div class="card">

<div class="tabs">
<div class="tab active" onclick="openTab('planner',this)">Student Planner</div>
<div class="tab" onclick="openTab('compare',this)">Result Comparison</div>
</div>

<div id="planner" class="tabcontent" style="display:block">
<div class="form-group">
Student ID  
<input id="studentID">
<button onclick="loadStudent()">Load Student</button>
</div>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Class:</b> <span id="class"></span></p>

<table>
<tr>
<th>Assessment</th>
<th>Max</th>
<th>Weight</th>
<th>Target Mark</th>
<th>Percentage</th>
</tr>
<tr><td id="nameA1"></td><td id="maxA1"></td><td id="perA1"></td><td><input id="targetA1" oninput="updateComparison()"></td><td id="resA1"></td></tr>
<tr><td id="nameA2"></td><td id="maxA2"></td><td id="perA2"></td><td><input id="targetA2" oninput="updateComparison()"></td><td id="resA2"></td></tr>
<tr><td id="nameA3"></td><td id="maxA3"></td><td id="perA3"></td><td><input id="targetA3" oninput="updateComparison()"></td><td id="resA3"></td></tr>
<tr><td id="nameA4"></td><td id="maxA4"></td><td id="perA4"></td><td><input id="targetA4" oninput="updateComparison()"></td><td id="resA4"></td></tr>
</table>

<div class="totalbox">
Total Target Percentage: <span id="totalTarget">0</span>%
</div>

<button onclick="saveTarget()">Save Target</button>
</div>

<div id="compare" class="tabcontent">
<table>
<tr>
<th>Assessment</th>
<th>Target %</th>
<th>Actual %</th>
</tr>
<tr><td id="compA1"></td><td id="compTargetA1"></td><td id="actualA1"></td></tr>
<tr><td id="compA2"></td><td id="compTargetA2"></td><td id="actualA2"></td></tr>
<tr><td id="compA3"></td><td id="compTargetA3"></td><td id="actualA3"></td></tr>
<tr><td id="compA4"></td><td id="compTargetA4"></td><td id="actualA4"></td></tr>
</table>

<div class="totalbox">
Total Target %: <span id="totalCompTarget">0</span>%
<br>
Total Actual %: <span id="totalCompActual">0</span>%
</div>
</div>

</div>
</div>

<script>
var url="https://script.google.com/macros/s/AKfycbz_dYGFavfWewInzRkaZM99DYX27hbcgudMCstUIm0N4buP56nGU9L9oJdmOn0G2xS4mw/exec"; // ganti URL Web App

function openTab(tab,el){
document.querySelectorAll(".tabcontent").forEach(x=>x.style.display="none");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(tab).style.display="block";
el.classList.add("active");
}

function calcTarget(){
let total=0;
for(let i=1;i<=4;i++){
let target=parseFloat(document.getElementById("targetA"+i).value)||0;
let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
let percent=max>0?(target/max)*100:0;
document.getElementById("resA"+i).innerText=percent.toFixed(2);
total+=percent;
}
document.getElementById("totalTarget").innerText=total.toFixed(2);
document.getElementById("totalCompTarget").innerText=total.toFixed(2);
}

function calcActual(){
let total=0;
for(let i=1;i<=4;i++){
let actual=parseFloat(document.getElementById("actualA"+i).innerText)||0;
let max=parseFloat(document.getElementById("maxA"+i).innerText)||0;
let percent=max>0?(actual/max)*100:0;
document.getElementById("actualA"+i).innerText=percent.toFixed(2);
total+=percent;
}
document.getElementById("totalCompActual").innerText=total.toFixed(2);
}

function colorCodeComparison(){
for(let i=1;i<=4;i++){
let target=parseFloat(document.getElementById("targetA"+i).value)||0;
let actual=parseFloat(document.getElementById("actualA"+i).innerText)||0;
document.getElementById("actualA"+i).style.backgroundColor=actual>=target?"#c8e6c9":"#ffcdd2";
}
}

function updateComparison(){
calcTarget();
calcActual();
colorCodeComparison();
for(let i=1;i<=4;i++){
let target=parseFloat(document.getElementById("targetA"+i).value)||0;
document.getElementById("compTargetA"+i).innerText=target.toFixed(2);
}
}

function loadStudent(){
var id=document.getElementById("studentID").value;
fetch(url+"?id="+id)
.then(res=>res.json())
.then(data=>{
if(!data || data.length==0){alert("Incorrect ID. Student not found!"); return;}
document.getElementById("name").innerText=data[0];
document.getElementById("class").innerText=data[2];
document.getElementById("nameA1").innerText=data[3];
document.getElementById("nameA2").innerText=data[8];
document.getElementById("nameA3").innerText=data[13];
document.getElementById("nameA4").innerText=data[18];
document.getElementById("compA1").innerText=data[3];
document.getElementById("compA2").innerText=data[8];
document.getElementById("compA3").innerText=data[13];
document.getElementById("compA4").innerText=data[18];
document.getElementById("maxA1").innerText=data[5];
document.getElementById("perA1").innerText=data[6];
document.getElementById("maxA2").innerText=data[10];
document.getElementById("perA2").innerText=data[11];
document.getElementById("maxA3").innerText=data[15];
document.getElementById("perA3").innerText=data[16];
document.getElementById("maxA4").innerText=data[20];
document.getElementById("perA4").innerText=data[21];
document.getElementById("actualA1").innerText=data[7];
document.getElementById("actualA2").innerText=data[12];
document.getElementById("actualA3").innerText=data[17];
document.getElementById("actualA4").innerText=data[22];
updateComparison();
})
.catch(err=>alert("Failed to load student data. Check Google Sheet URL and permissions."));
}

function saveTarget(){
var id=document.getElementById("studentID").value;
var payload={
id:id,
targetA1:document.getElementById("targetA1").value,
targetA2:document.getElementById("targetA2").value,
targetA3:document.getElementById("targetA3").value,
targetA4:document.getElementById("targetA4").value
};
fetch(url,{method:"POST",body:JSON.stringify(payload),headers:{"Content-Type":"application/json"}})
.then(res=>res.json())
.then(data=>{
if(data.ok){alert("Target marks saved successfully!"); updateComparison();}
else{alert("Error: "+data.message);}
})
.catch(err=>alert("Failed to save target marks. Check network or script permissions."));
}
</script>
</body>
</html>
